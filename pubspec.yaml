name: denio_imagine
description: Denio Imagine - Jasa Photography, Design Graphic & Printing
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  go_router: ^13.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  provider: ^6.1.1
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/background.png
    - assets/images/profile.png
    - assets/images/printing-bg.png
    - assets/images/dg-bg.png
    - assets/images/photography-bg.png
    - assets/icons/
